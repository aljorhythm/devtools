# Self-hosted PR-evidence file server: dufs behind Caddy.
#
#   - dufs serves /data and accepts authenticated HTTP PUT uploads. It is NOT
#     published to the host — only Caddy can reach it (over the compose network).
#   - Caddy terminates TLS (auto Let's Encrypt cert for $EVIDENCE_DOMAIN) and
#     gates WRITES behind a hardcoded bearer token; READS stay public so
#     GitHub's image proxy (camo) can render the screenshots inline in a PR.
#
# Config comes from a .env file next to this one (see .env.example):
#   EVIDENCE_DOMAIN  DNS name with a public A record -> this VM (or <ip>.nip.io)
#   EVIDENCE_TOKEN   the hardcoded write token; clients send "Authorization: Bearer <it>"

services:
  dufs:
    image: sigoden/dufs
    command: /data --allow-upload --bind 0.0.0.0 --port 5000
    volumes:
      - ./data:/data # the evidence archive — back this directory up
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on: [dufs]
    ports:
      - "80:80"
      - "443:443"
    environment:
      EVIDENCE_DOMAIN: ${EVIDENCE_DOMAIN:?set EVIDENCE_DOMAIN in .env}
      EVIDENCE_TOKEN: ${EVIDENCE_TOKEN:?set EVIDENCE_TOKEN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persists the issued TLS certificate
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
